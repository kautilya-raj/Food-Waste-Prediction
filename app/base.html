<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FoodWise — Food Waste Predictor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-brand">
      <span class="brand-icon">🌿</span>
      <span class="brand-name">FoodWise</span>
    </a>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('api_model_info') }}" target="_blank">API</a>
      <a href="{{ url_for('train_models') }}" class="btn-train">Train Models</a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>FoodWise &mdash; ML-powered food waste reduction &copy; 2025</p>
  </footer>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
