<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FoodWise{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('landing') }}" class="nav-brand">
      <span class="brand-dot"></span>
      <span class="brand-name">FoodWise</span>
    </a>
    <div class="nav-links">
      <a href="{{ url_for('landing') }}">Home</a>
      <a href="{{ url_for('index') }}">Dashboard</a>
      <a href="{{ url_for('about') }}">About</a>
      <a href="{{ url_for('api_model_info') }}" target="_blank">API</a>
      <a href="{{ url_for('train_upload_page') }}" class="btn-nav-primary">📂 Train with Data</a>
      <a href="{{ url_for('train_models') }}" class="btn-nav-ghost">Auto Train</a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>FoodWise &mdash; ML-powered food waste reduction &copy; 2025</p>
  </footer>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
